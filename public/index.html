<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Realtime Task Dashboard</title>
    <script>
      window.logsHistory = [];
      const originalLog = console.log;
      const originalError = console.error;
      const originalWarn = console.warn;
      console.log = (...args) => {
        window.logsHistory.push({ type: 'log', text: args.map(String).join(' ') });
        originalLog.apply(console, args);
      };
      console.error = (...args) => {
        window.logsHistory.push({ type: 'error', text: args.map(String).join(' ') });
        originalError.apply(console, args);
      };
      console.warn = (...args) => {
        window.logsHistory.push({ type: 'warn', text: args.map(String).join(' ') });
        originalWarn.apply(console, args);
      };
      window.addEventListener('error', (event) => {
        window.logsHistory.push({ type: 'uncaught-error', text: event.message + ' at ' + event.filename + ':' + event.lineno });
      });
    </script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; }
      body { background-color: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      /* Simulate a mobile-width viewport centered on desktop */
      #root {
        display: flex;
        justify-content: center;
        background-color: #111827;
      }
      #app-shell {
        width: 100%;
        max-width: 480px;
        min-height: 100vh;
        background-color: #1a1a2e;
        position: relative;
        box-shadow: 0 0 60px rgba(0,0,0,0.6);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-shell"></div>
    </div>
  </body>
</html>
